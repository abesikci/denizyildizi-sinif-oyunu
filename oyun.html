<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çim Adam: Kusursuz Mod</title>
    <style>
        body {
            margin: 0;
            background-color: #b2ebf2;
            background-image: linear-gradient(0deg, #4db6ac 0%, #b2ebf2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* justify-content: center; KOMUTUNU KALDIRDIK */
            min-height: 100vh;
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .bilgi-cubugu {
            width: 90%;
            max-width: 900px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            margin-top: 20px; /* HER ZAMAN TEPEDEN 20PX AŞAĞIDA DURACAK */
            box-shadow: 0 8px 0px #00796b;
            font-size: 1.5em;
            color: #00796b;
            z-index: 10;
        }

        #seviye-gosterge { color: #f57c00; font-weight: bold; }

        .oyun-alani {
            width: 95%;
            max-width: 900px; 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            /* SADECE OYUN ALANINI ORTADA TUTAN SİHİRLİ KOMUTLAR: */
            margin-top: auto; 
            margin-bottom: auto;
        }

        .slot {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .delik {
            position: absolute;
            bottom: 10%;
            width: 90%;
            height: 30%;
            background: #4e342e;
            border-radius: 50%;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .maske {
            position: absolute;
            bottom: 20%; 
            width: 95%; 
            height: 95%;
            overflow: hidden; 
            z-index: 2;
        }

        .karakter {
            position: absolute;
            bottom: -100%; 
            width: 100%;
            height: 100%;
            transition: bottom 0.15s ease-out; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; 
        }

        .karakter.yukari { bottom: 0; }
        .karakter.vuruldu { transform: scale(0.8) translateY(20px); opacity: 0.5; transition: 0.1s; }

        .bitis-ekrani {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 105, 92, 0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        #hazirlik {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0097a7; z-index: 95; display: flex; 
            justify-content: center; align-items: center; font-size: 8em; color: white;
        }

        @media (max-width: 600px) {
            .oyun-alani { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: auto; margin-bottom: auto; }
            .bilgi-cubugu { font-size: 1em; padding: 10px 15px; border-radius: 15px; }
            .bitis-ekrani h1 { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <div id="hazirlik">3</div>

    <div class="bilgi-cubugu">
        <div><span id="oyuncu-ismi">...</span></div>
        <div id="seviye-gosterge">LEVEL: 1</div>
        <div>Puan: <span id="skor">0</span></div>
        <div id="sure-alani">40</div>
    </div>

    <div class="oyun-alani" id="oyunAlani"></div>

    <div class="bitis-ekrani" id="bitis">
        <h1 id="mesaj" style="font-size: 4em; margin:0; text-shadow: 3px 3px 0px #004d40;">OYUN BİTTİ!</h1>
        <p id="sonuc" style="font-size: 2em;">0 Puan</p>
        <button style="padding:15px 40px; font-size:1.5em; border-radius:30px; border:none; background:#ffeb3b; font-weight:bold; cursor:pointer;" onclick="location.href='index.html'">Geri Dön</button>
    </div>

    <script>
        let oyuncu = "Süper Çocuk";
        try { oyuncu = localStorage.getItem('aktifOyuncu') || "Bahçıvan"; } catch(e) {}
        document.getElementById('oyuncu-ismi').innerText = oyuncu;

        const oyunAlani = document.getElementById('oyunAlani');
        const hazirlikEkrani = document.getElementById('hazirlik');
        
        let skor = 0;
        let kalanSure = 40;
        let oyunBitti = false;
        
        let ekrandaKalmaSuresi = 1200; 
        let firlatmaAraligi = 1000;    
        let level = 1;

        const mobilEkranMi = window.innerWidth <= 600;
        const toplamSlot = mobilEkranMi ? 6 : 8;

        let musaitSlotlar = [];

        for(let i=0; i<toplamSlot; i++) {
            musaitSlotlar.push(i);
            oyunAlani.innerHTML += `
                <div class="slot">
                    <div class="delik"></div>
                    <div class="maske"><div class="karakter" data-index="${i}"></div></div>
                </div>
            `;
        }

        const karakterler = document.querySelectorAll('.karakter');

        const dostCim = `<svg viewBox="0 0 100 120"><path d="M20 50 Q10 0 35 30 Q50 -20 65 30 Q90 0 80 50" fill="#4caf50" stroke="#1b5e20" stroke-width="2"/><circle cx="50" cy="70" r="35" fill="#8bc34a"/><circle cx="35" cy="65" r="10" fill="white"/><circle cx="35" cy="65" r="5" fill="black"/><circle cx="65" cy="65" r="10" fill="white"/><circle cx="65" cy="68" r="5" fill="black"/><path d="M40 85 Q50 95 60 85" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/><rect x="47" y="88" width="6" height="7" fill="white"/></svg>`;
        const dusmanCim = `<svg viewBox="0 0 100 120"><path d="M20 50 Q10 10 35 40 Q50 -10 65 40 Q90 10 80 50" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/><circle cx="50" cy="70" r="35" fill="#f44336"/><circle cx="35" cy="65" r="8" fill="black"/><circle cx="65" cy="65" r="8" fill="black"/><path d="M25 55 L45 62" stroke="black" stroke-width="4" stroke-linecap="round"/><path d="M75 55 L55 62" stroke="black" stroke-width="4" stroke-linecap="round"/><path d="M40 90 Q50 80 60 90" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`;

        function adamCikar() {
            if(oyunBitti || musaitSlotlar.length === 0) return;

            let rastgeleIndex = Math.floor(Math.random() * musaitSlotlar.length);
            let secilenSaksiNo = musaitSlotlar.splice(rastgeleIndex, 1)[0]; 
            
            let secilenKarakter = karakterler[secilenSaksiNo];
            
            const dusmanMi = Math.random() < 0.25; 
            secilenKarakter.innerHTML = dusmanMi ? dusmanCim : dostCim;
            secilenKarakter.className = dusmanMi ? 'karakter dusman yukari' : 'karakter yukari';

            secilenKarakter.inmeZamanlayici = setTimeout(() => {
                asagiIndir(secilenKarakter, secilenSaksiNo);
            }, ekrandaKalmaSuresi);
        }

        function asagiIndir(karakter, saksıNo) {
            karakter.classList.remove('yukari');
            
            setTimeout(() => {
                karakter.classList.remove('vuruldu'); 
                if (!musaitSlotlar.includes(saksıNo)) {
                    musaitSlotlar.push(saksıNo);
                }
            }, 200);
        }

        function oyunDongusu() {
            if(oyunBitti) return;

            adamCikar(); 

            let ikinciCikmaIhtimali = 0;
            if(level === 2) ikinciCikmaIhtimali = 0.4; 
            if(level === 3) ikinciCikmaIhtimali = 0.6; 

            if(Math.random() < ikinciCikmaIhtimali) {
                let asenkronGecikme = Math.random() * 300 + 200; 
                setTimeout(() => {
                    if(!oyunBitti) adamCikar();
                }, asenkronGecikme);
            }

            let sonrakiDongu = firlatmaAraligi * (Math.random() * 0.3 + 0.85);
            setTimeout(oyunDongusu, sonrakiDongu);
        }

        function vur(el, event) {
            if(event) event.preventDefault(); 
            if(!el.classList.contains('yukari') || el.classList.contains('vuruldu')) return;

            el.classList.add('vuruldu');
            
            clearTimeout(el.inmeZamanlayici);
            
            if(el.classList.contains('dusman')) {
                skor = Math.max(0, skor - 3);
            } else {
                skor += 1;
            }
            document.getElementById('skor').innerText = skor;
            
            let saksıNo = parseInt(el.dataset.index);
            setTimeout(() => {
                asagiIndir(el, saksıNo);
            }, 100);
        }

        karakterler.forEach(el => {
            el.addEventListener('pointerdown', function(e) { vur(this, e); }, { passive: false });
        });

        function zorluguGuncelle() {
            if (kalanSure <= 20 && kalanSure > 10 && level === 1) {
                level = 2; 
                ekrandaKalmaSuresi = 1100; 
                firlatmaAraligi = 900; 
                ekraniRenklendir('#fb8c00');
            } else if (kalanSure <= 10 && level === 2) {
                level = 3; 
                ekrandaKalmaSuresi = 1000; 
                firlatmaAraligi = 800; 
                ekraniRenklendir('#d84315');
            }
            document.getElementById('seviye-gosterge').innerText = "LEVEL: " + level;
        }

        function ekraniRenklendir(renk) {
            document.getElementById('seviye-gosterge').style.color = renk;
            document.body.style.transition = "background 0.5s";
        }

        function baslat() {
            oyunDongusu(); 
            
            const sureInterval = setInterval(() => {
                kalanSure--;
                document.getElementById('sure-alani').innerText = kalanSure;
                zorluguGuncelle(); 
                
                if(kalanSure <= 0) {
                    clearInterval(sureInterval);
                    oyunBitti = true;
                    bitir();
                }
            }, 1000);
        }

        function bitir() {
            document.getElementById('bitis').style.display = 'flex';
            document.getElementById('sonuc').innerText = skor + " Puan topladın!";
            try {
                let skorlar = JSON.parse(localStorage.getItem('oyunSkorlari')) || {};
                if (!skorlar[oyuncu] || skor > skorlar[oyuncu]) skorlar[oyuncu] = skor;
                localStorage.setItem('oyunSkorlari', JSON.stringify(skorlar));
            } catch(e) {}
        }

        let hazirlikSayac = 3;
        function geriSayimiBaslat() {
            hazirlikEkrani.innerText = hazirlikSayac;
            const hazirlikInterval = setInterval(() => {
                hazirlikSayac--;
                if(hazirlikSayac > 0) {
                    hazirlikEkrani.innerText = hazirlikSayac;
                } else if (hazirlikSayac === 0) {
                    hazirlikEkrani.innerText = "BAŞLA!";
                    hazirlikEkrani.style.color = "#ffeb3b";
                } else {
                    clearInterval(hazirlikInterval);
                    hazirlikEkrani.style.display = 'none';
                    baslat(); 
                }
            }, 1000);
        }

        geriSayimiBaslat();
    </script>
</body>
</html>
