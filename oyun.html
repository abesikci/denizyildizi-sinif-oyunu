<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Çim Adam: Taklitçi Sinsi Düşman</title>
    <style>
        body {
            margin: 0;
            background-color: #b2ebf2;
            background-image: linear-gradient(0deg, #4db6ac 0%, #b2ebf2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* Bilgi çubuğu her zaman yukarıda sabittir */
        .bilgi-cubugu {
            width: 90%;
            max-width: 900px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 8px 0px #00796b;
            font-size: 1.5em;
            color: #00796b;
            z-index: 10;
        }

        #seviye-gosterge { color: #f57c00; font-weight: bold; }

        .oyun-alani {
            width: 95%;
            max-width: 900px; 
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            /* Sadece oyun alanını ortada tutar */
            margin-top: auto; 
            margin-bottom: auto;
        }

        .slot {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .delik {
            position: absolute;
            bottom: 5%;
            width: 90%;
            height: 40%;
            z-index: 1;
        }

        .maske {
            position: absolute;
            bottom: 20%; 
            width: 95%; 
            height: 95%;
            overflow: hidden; 
            z-index: 2;
        }

        .karakter {
            position: absolute;
            bottom: -100%; 
            width: 100%;
            height: 100%;
            transition: bottom 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .karakter svg {
            width: 90%;
            height: 90%;
            filter: drop-shadow(0px 8px 4px rgba(0,0,0,0.25)); 
        }

        .karakter.yukari { bottom: 0; }
        .karakter.vuruldu { transform: scale(0.8) translateY(20px); opacity: 0.5; transition: 0.1s; }

        .bitis-ekrani {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 105, 92, 0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        #hazirlik {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0097a7; z-index: 95; display: flex; 
            justify-content: center; align-items: center; font-size: 8em; color: white;
        }

        @media (max-width: 600px) {
            .oyun-alani { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .bilgi-cubugu { font-size: 1em; padding: 10px 15px; border-radius: 15px; flex-wrap: wrap; justify-content: space-around;}
            .bitis-ekrani h1 { font-size: 2.5em; }
        }
    </style>
</head>
<body>

    <div id="hazirlik">3</div>

    <div class="bilgi-cubugu">
        <div id="oyuncu-ismi">...</div>
        <div id="seviye-gosterge">LEVEL: 1</div>
        <div>Puan: <span id="skor">0</span></div>
        <div id="sure-alani">40</div>
    </div>

    <div class="oyun-alani" id="oyunAlani"></div>

    <div class="bitis-ekrani" id="bitis">
        <h1 id="mesaj" style="font-size: 4em; margin:0; text-shadow: 3px 3px 0px #004d40;">OYUN BİTTİ!</h1>
        <p id="sonuc" style="font-size: 2em;">0 Puan</p>
        <button style="padding:15px 40px; font-size:1.5em; border-radius:30px; border:none; background:#ffeb3b; font-weight:bold; cursor:pointer;" onclick="location.href='index.html'">Geri Dön</button>
    </div>

    <script>
        // Oyuncu İsmini Güvenli Çekme
        let oyuncu = "Süper Bora";
        try {
            oyuncu = localStorage.getItem('aktifOyuncu') || "Bahçıvan";
        } catch(e) {}
        document.getElementById('oyuncu-ismi').innerText = oyuncu;

        const oyunAlani = document.getElementById('oyunAlani');
        const hazirlikEkrani = document.getElementById('hazirlik');
        
        let skor = 0;
        let kalanSure = 40;
        let oyunBitti = false;
        
        // Seviye Ayarları (20-10-10 düzeni)
        let ekrandaKalmaSuresi = 1200; // Başlangıç 1.2 sn
        let firlatmaAraligi = 1000;    // Başlangıç sıklığı
        let level = 1;

        const mobilEkranMi = window.innerWidth <= 600;
        const toplamSlot = mobilEkranMi ? 6 : 8;

        let musaitSlotlar = [];
        let ardardaDostSayisi = 0;

        // --- PREMIUM SAKSI SVG ---
        const saksıSvg = `
        <svg viewBox="0 0 100 60" width="100%" height="100%">
            <defs>
                <linearGradient id="saksiG" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#8d5524"/>
                    <stop offset="50%" stop-color="#c68642"/>
                    <stop offset="100%" stop-color="#603813"/>
                </linearGradient>
                <linearGradient id="toprakG" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#2c1a0f"/>
                    <stop offset="100%" stop-color="#140c07"/>
                </linearGradient>
            </defs>
            <path d="M 15 25 L 25 55 Q 50 65 75 55 L 85 25 Z" fill="url(#saksiG)"/>
            <ellipse cx="50" cy="25" rx="42" ry="12" fill="#543314"/>
            <ellipse cx="50" cy="22" rx="45" ry="14" fill="url(#saksiG)" stroke="#543314" stroke-width="2"/>
            <ellipse cx="50" cy="20" rx="38" ry="10" fill="url(#toprakG)"/>
        </svg>`;

        // --- DOST ÇİM ADAM (GÜR SAÇLI, HASIR RENGİ) ---
        const dostCimSvg = `
        <svg viewBox="0 0 100 120" width="100%" height="100%">
            <defs>
                <radialGradient id="dostBody" cx="35%" cy="35%" r="65%">
                    <stop offset="0%" stop-color="#f5d6a6"/>
                    <stop offset="70%" stop-color="#d4a373"/>
                    <stop offset="100%" stop-color="#a87b51"/>
                </radialGradient>
            </defs>
            <path d="M15 50 L10 15 L20 40 L25 5 L35 30 L40 5 L50 30 L60 5 L65 30 L75 5 L80 40 L85 15 L80 50 Z" fill="#4caf50"/>
            <path d="M18 45 L13 20 L22 42 L28 10 L38 35 L45 8 L55 35 L62 10 L68 42 L77 20 L82 45 Z" fill="#66bb6a" opacity="0.6"/>
            <ellipse cx="50" cy="75" rx="40" ry="38" fill="url(#dostBody)"/>
            <path d="M45 113 L55 113 L50 120 Z" fill="#a87b51"/> 
            
            <path d="M20 55 Q15 25 30 45 Q35 15 45 45 Q50 10 55 45 Q65 15 70 45 Q85 25 80 55" fill="none" stroke="#66bb6a" stroke-width="7" stroke-linecap="round"/>
            <path d="M25 60 Q20 30 38 48 Q48 18 58 48 Q72 30 75 60" fill="none" stroke="#8bc34a" stroke-width="5" stroke-linecap="round"/>
            <path d="M28 65 Q22 35 32 50 Q42 25 50 50 Q60 25 70 50 Q78 35 72 65" fill="none" stroke="#aed581" stroke-width="3" stroke-linecap="round"/>
            
            <circle cx="35" cy="65" r="12" fill="white" stroke="#8d6e63" stroke-width="1"/>
            <circle cx="37" cy="65" r="5" fill="black"/>
            <circle cx="39" cy="63" r="2" fill="white"/> 
            <circle cx="65" cy="65" r="12" fill="white" stroke="#8d6e63" stroke-width="1"/>
            <circle cx="63" cy="65" r="5" fill="black"/>
            <circle cx="61" cy="63" r="2" fill="white"/> 
            
            <ellipse cx="50" cy="78" rx="8" ry="6" fill="#3e2723"/>
            <ellipse cx="48" cy="76" rx="3" ry="1.5" fill="white" opacity="0.5"/>
            <path d="M38 88 Q50 100 62 88" stroke="#d32f2f" stroke-width="4" fill="none" stroke-linecap="round"/>
            <rect x="46" y="89" width="6" height="5" fill="white" rx="1"/>
        </svg>`;

        // --- TAKLİTÇİ SİNSİ DÜŞMAN ÇİM ADAM (AYNI TEN RENGİ) ---
        const dusmanCimSvg = `
        <svg viewBox="0 0 100 120" width="100%" height="100%">
            <defs>
                <radialGradient id="dusmanBody" cx="40%" cy="40%" r="65%">
                    <stop offset="0%" stop-color="#f5d6a6"/>
                    <stop offset="60%" stop-color="#d4a373"/>
                    <stop offset="100%" stop-color="#a87b51"/>
                </radialGradient>
            </defs>
            <path d="M15 60 L10 25 L25 45 L35 15 L45 40 L50 20 L55 40 L65 15 L80 45 L90 25 L85 60 Z" fill="#1b5e20"/>
            <path d="M18 55 L13 30 L28 48 L38 20 L48 42 L53 25 L58 42 L68 20 L83 48 L93 30 L88 55 Z" fill="#2e7d32" opacity="0.7"/>
            <ellipse cx="50" cy="75" rx="40" ry="38" fill="url(#dusmanBody)"/>
            <path d="M45 113 L55 113 L50 120 Z" fill="#a87b51"/> <path d="M25 60 L20 35 L35 50 L45 25 L50 50 L60 25 L70 50 L80 35 L75 60" fill="none" stroke="#2e7d32" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M30 65 L25 40 L40 55 L50 30 L60 55 L75 40 L70 65" fill="none" stroke="#000000" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
            
            <path d="M 25 60 Q 35 55 45 62" stroke="#2c0000" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M 75 60 Q 65 55 55 62" stroke="#2c0000" stroke-width="4" fill="none" stroke-linecap="round"/>
            
            <circle cx="35" cy="67" r="10" fill="white" stroke="#2c0000" stroke-width="1"/>
            <circle cx="34" cy="68" r="4" fill="#000000"/> 
            <circle cx="35" cy="65" r="2" fill="white" opacity="0.4"/>
            <circle cx="65" cy="67" r="10" fill="white" stroke="#2c0000" stroke-width="1"/>
            <circle cx="66" cy="68" r="4" fill="#000000"/> 
            <circle cx="65" cy="65" r="2" fill="white" opacity="0.4"/>
            
            <ellipse cx="50" cy="78" rx="6" ry="5" fill="#2c0000"/>
            
            <path d="M45 95 Q50 90 55 95" stroke="#3e2723" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>`;

        oyunAlani.innerHTML = ''; 
        for(let i=0; i<toplamSlot; i++) {
            musaitSlotlar.push(i);
            oyunAlani.innerHTML += `
                <div class="slot">
                    <div class="delik">${saksıSvg}</div>
                    <div class="maske">
                        <div class="karakter" data-index="${i}" data-mesgul="false"></div>
                    </div>
                </div>
            `;
        }

        const karakterler = document.querySelectorAll('.karakter');

        function adamCikar() {
            if(oyunBitti || musaitSlotlar.length === 0) return;

            let rastgeleIndex = Math.floor(Math.random() * musaitSlotlar.length);
            let secilenSaksiNo = musaitSlotlar.splice(rastgeleIndex, 1)[0]; 
            
            let secilenKarakter = karakterler[secilenSaksiNo];
            secilenKarakter.dataset.mesgul = "true"; 
            
            let dusmanMi = Math.random() < 0.30; 

            if (!dusmanMi) {
                ardardaDostSayisi++;
                if (ardardaDostSayisi >= 4) {
                    dusmanMi = true;
                }
            }

            if (dusmanMi) {
                ardardaDostSayisi = 0;
                secilenKarakter.innerHTML = dusmanCimSvg;
                secilenKarakter.classList.add('dusman');
            } else {
                secilenKarakter.innerHTML = dostCimSvg;
                secilenKarakter.classList.remove('dusman');
            }
            
            secilenKarakter.classList.add('yukari');

            secilenKarakter.inmeZamanlayici = setTimeout(() => {
                asagiIndir(secilenKarakter, secilenSaksiNo);
            }, ekrandaKalmaSuresi);
        }

        function asagiIndir(karakter, saksıNo) {
            karakter.classList.remove('yukari');
            
            setTimeout(() => {
                karakter.classList.remove('vuruldu'); 
                if (!musaitSlotlar.includes(saksıNo)) {
                    musaitSlotlar.push(saksıNo);
                    karakter.dataset.mesgul = "false"; 
                }
            }, 200);
        }

        function oyunDongusu() {
            if(oyunBitti) return;

            adamCikar(); 

            let ikinciCikmaIhtimali = 0;
            if(level === 2) ikinciCikmaIhtimali = 0.4; 
            if(level === 3) ikinciCikmaIhtimali = 0.6; 

            if(Math.random() < ikinciCikmaIhtimali) {
                let asenkronGecikme = Math.random() * 300 + 200; 
                setTimeout(() => {
                    if(!oyunBitti) adamCikar();
                }, asenkronGecikme);
            }

            let sonrakiDongu = firlatmaAraligi * (Math.random() * 0.3 + 0.85);
            setTimeout(oyunDongusu, sonrakiDongu);
        }

        function vur(el, event) {
            if(event) event.preventDefault(); 
            if(!el.classList.contains('yukari') || el.classList.contains('vuruldu')) return;

            el.classList.add('vuruldu');
            
            clearTimeout(el.inmeZamanlayici);
            
            if(el.classList.contains('dusman')) {
                skor = Math.max(0, skor - 3);
            } else {
                skor += 1;
            }
            document.getElementById('skor').innerText = skor;
            
            let saksıNo = parseInt(el.dataset.index);
            setTimeout(() => {
                asagiIndir(el, saksıNo);
            }, 100);
        }

        karakterler.forEach(el => {
            el.addEventListener('pointerdown', function(e) { vur(this, e); }, { passive: false });
        });

        function zorluguGuncelle() {
            if (kalanSure <= 20 && kalanSure > 10 && level === 1) {
                level = 2; 
                ekrandaKalmaSuresi = 1100; 
                firlatmaAraligi = 900; 
                ekraniRenklendir('#fb8c00');
            } else if (kalanSure <= 10 && level === 2) {
                level = 3; 
                ekrandaKalmaSuresi = 1000; 
                firlatmaAraligi = 800; 
                ekraniRenklendir('#d84315');
            }
            document.getElementById('seviye-gosterge').innerText = "LEVEL: " + level;
        }

        function ekraniRenklendir(renk) {
            document.getElementById('seviye-gosterge').style.color = renk;
            document.body.style.transition = "background 0.5s";
        }

        function baslat() {
            oyunDongusu(); 
            
            const sureInterval = setInterval(() => {
                kalanSure--;
                document.getElementById('sure-alani').innerText = kalanSure;
                zorluguGuncelle(); 
                
                if(kalanSure <= 0) {
                    clearInterval(sureInterval);
                    oyunBitti = true;
                    bitir();
                }
            }, 1000);
        }

        function bitir() {
            document.getElementById('bitis').style.display = 'flex';
            document.getElementById('sonuc').innerText = skor + " Puan topladın!";
            
            try {
                let skorlar = JSON.parse(localStorage.getItem('oyunSkorlari')) || {};
                if (!skorlar[oyuncu] || skor > skorlar[oyuncu]) skorlar[oyuncu] = skor;
                localStorage.setItem('oyunSkorlari', JSON.stringify(skorlar));
            } catch(e) {}
        }

        let hazirlikSayac = 3;
        function geriSayimiBaslat() {
            hazirlikEkrani.innerText = hazirlikSayac;
            const hazirlikInterval = setInterval(() => {
                hazirlikSayac--;
                if(hazirlikSayac > 0) {
                    hazirlikEkrani.innerText = hazirlikSayac;
                } else if (hazirlikSayac === 0) {
                    hazirlikEkrani.innerText = "BAŞLA!";
                    hazirlikEkrani.style.color = "#ffeb3b";
                } else {
                    clearInterval(hazirlikInterval);
                    hazirlikEkrani.style.display = 'none';
                    baslat();
                }
            }, 1000);
        }

        geriSayimiBaslat();
    </script>
</body>
</html>
